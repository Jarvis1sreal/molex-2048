<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="产品合成 2048 · Molex 产品线 — 纯前端零依赖、可离线运行的合成小游戏" />
  <title>产品合成 2048 · Molex 产品线</title>
  <style>
/* =========================================================================
 * 产品合成 2048 · Molex 产品线
 * 样式表 — 深蓝科技风、响应式、零运行时外网依赖
 * ========================================================================= */

:root {
  --navy: #0a2540;
  --navy-2: #0d2e52;
  --blue: #0072ce;
  --blue-2: #005bb0;
  --bg-grad: radial-gradient(circle at 18% -10%, #12406e 0%, #0a2540 46%, #061829 100%);
  --text: #e8eef6;
  --muted: #9fb3c8;
  --panel: #0f2e4f;
  --panel-2: #11365c;
  --cell-bg: rgba(255, 255, 255, 0.06);
  --line: rgba(255, 255, 255, 0.10);

  /* 棋盘几何（被 game.js 的 calc 引用，修改需保持一致） */
  --pad: 12px;
  --gap: 12px;
  --n: 4;

  --radius: 14px;
  --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
}

* { box-sizing: border-box; }

html, body { height: 100%; }

body {
  margin: 0;
  font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
  color: var(--text);
  background: var(--bg-grad);
  background-attachment: fixed;
  -webkit-font-smoothing: antialiased;
  line-height: 1.4;
}

.app {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px 18px 36px;
}

/* ----------------------------- Header ----------------------------------- */
.app-header {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}

.brand { display: flex; align-items: center; gap: 14px; }

.logo {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: grid;
  place-items: center;
  font-weight: 800;
  font-size: 26px;
  color: #fff;
  background: linear-gradient(135deg, var(--blue) 0%, #00a0e0 100%);
  box-shadow: 0 8px 20px rgba(0, 114, 206, 0.45);
}

.titles h1 {
  margin: 0;
  font-size: 26px;
  letter-spacing: 0.5px;
}
.titles p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 14px;
}
.titles strong { color: #ffd66b; }

.scores { display: flex; gap: 12px; }

.score-box {
  min-width: 92px;
  padding: 10px 16px;
  border-radius: 12px;
  background: var(--panel);
  border: 1px solid var(--line);
  text-align: center;
  box-shadow: var(--shadow);
}
.score-label { display: block; font-size: 12px; color: var(--muted); letter-spacing: 1px; }
.score-value { display: block; font-size: 24px; font-weight: 800; margin-top: 2px; }

/* ----------------------------- Layout ----------------------------------- */
.layout {
  display: flex;
  gap: 22px;
  align-items: flex-start;
}
.game-panel { flex: 1 1 auto; min-width: 0; }
.side-panel { flex: 0 0 280px; display: flex; flex-direction: column; gap: 18px; }

/* ----------------------------- Toolbar ---------------------------------- */
.toolbar {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}
.hint { color: var(--muted); font-size: 13px; margin: 0; }

.btn {
  appearance: none;
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--text);
  font-size: 15px;
  font-weight: 700;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.08s ease, filter 0.15s ease, background 0.15s ease;
}
.btn:hover { filter: brightness(1.12); }
.btn:active { transform: translateY(1px) scale(0.98); }
.btn-primary {
  background: linear-gradient(135deg, var(--blue) 0%, #00a0e0 100%);
  border-color: transparent;
  box-shadow: 0 8px 18px rgba(0, 114, 206, 0.4);
}

/* ----------------------------- Board ------------------------------------ */
.board {
  position: relative;
  width: min(92vw, 460px);
  aspect-ratio: 1 / 1;
  margin: 0 auto;
  padding: 0;
  background: linear-gradient(160deg, var(--panel) 0%, var(--navy-2) 100%);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  touch-action: none;           /* 阻止棋盘内滑动引发页面滚动 */
  container-type: inline-size;  /* 供瓦片字号使用 cqw 单位 */
  overflow: hidden;
}

.cells {
  position: absolute;
  top: var(--pad);
  left: var(--pad);
  right: var(--pad);
  bottom: var(--pad);
  display: grid;
  grid-template-columns: repeat(var(--n), 1fr);
  grid-template-rows: repeat(var(--n), 1fr);
  gap: var(--gap);
}
.cell {
  background: var(--cell-bg);
  border-radius: 10px;
}

.tiles { position: absolute; inset: 0; }

/* ----------------------------- Tile ------------------------------------- */
.tile {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  font-weight: 800;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 6px 14px rgba(0, 0, 0, 0.28);
  transition: left 0.12s ease, top 0.12s ease;
  z-index: 1;
  will-change: left, top;
}
.tile.tile-new { z-index: 10; animation: pop 0.18s ease; }
.tile.tile-merged { z-index: 20; animation: pop 0.2s ease 0.06s; }

.tile-inner {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2px 4px;
  line-height: 1.05;
  letter-spacing: 0.2px;
}
.tile-inner.sz-lg { font-size: 6cqw; }
.tile-inner.sz-md { font-size: 4.8cqw; }
.tile-inner.sz-sm { font-size: 4cqw; }

@keyframes pop {
  0% { transform: scale(0.2); opacity: 0.4; }
  60% { transform: scale(1.12); }
  100% { transform: scale(1); opacity: 1; }
}

/* ----------------------------- Overlay ---------------------------------- */
.overlay {
  position: absolute;
  inset: 0;
  z-index: 30;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  background: rgba(6, 22, 40, 0.86);
  backdrop-filter: blur(2px);
  animation: fade 0.2s ease;
}
.overlay[hidden] { display: none; }
.overlay-card {
  text-align: center;
  padding: 22px;
  max-width: 86%;
}
.overlay-card h2 { margin: 0 0 8px; font-size: 26px; }
.overlay-card p { margin: 0 0 18px; color: var(--muted); }
.overlay-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

@keyframes fade { from { opacity: 0; } to { opacity: 1; } }

/* ------------------------- Touch d-pad ---------------------------------- */
.touch-controls {
  display: none; /* 仅在窄屏显示 */
  width: min(92vw, 460px);
  margin: 16px auto 0;
  grid-template-columns: repeat(3, 64px);
  grid-template-rows: repeat(3, 64px);
  gap: 10px;
  justify-content: center;
}
.dpad {
  border: 1px solid var(--line);
  background: var(--panel-2);
  color: var(--text);
  font-size: 22px;
  border-radius: 14px;
  cursor: pointer;
  transition: filter 0.15s ease, transform 0.08s ease;
}
.dpad:hover { filter: brightness(1.15); }
.dpad:active { transform: scale(0.94); }
.dpad.up { grid-column: 2; grid-row: 1; }
.dpad.left { grid-column: 1; grid-row: 2; }
.dpad.down { grid-column: 2; grid-row: 3; }
.dpad.right { grid-column: 3; grid-row: 2; }

/* ----------------------------- Side cards ------------------------------- */
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}
.card h3 { margin: 0 0 12px; font-size: 15px; color: #cfe0f2; letter-spacing: 0.5px; }

.qr-card { text-align: center; }
.qr-box {
  width: 180px;
  height: 180px;
  margin: 0 auto;
  padding: 10px;
  background: #fff;
  border-radius: 12px;
  display: grid;
  place-items: center;
}
.qr-box img { width: 100%; height: 100%; image-rendering: pixelated; display: block; }
.qr-note {
  margin: 12px 0 0;
  font-size: 12px;
  color: var(--muted);
  word-break: break-all;
}

.legend ul { list-style: none; margin: 0; padding: 0; }
.legend li {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 0;
  font-size: 14px;
}
.swatch {
  flex: 0 0 auto;
  width: 16px;
  height: 16px;
  border-radius: 5px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

/* ----------------------------- Footer ----------------------------------- */
.app-footer {
  margin-top: 28px;
  text-align: center;
  color: var(--muted);
  font-size: 12px;
}

/* ----------------------------- Responsive ------------------------------- */
@media (max-width: 760px) {
  .app { padding: 14px 12px 24px; }
  .layout { flex-direction: column; align-items: stretch; }
  .side-panel { flex: 1 1 auto; }
  .touch-controls { display: grid; }
  .titles h1 { font-size: 22px; }
  /* 扫码打开（手机）时隐藏二维码卡片：手机无法扫自己屏幕上的码，徒占空间 */
  .qr-card { display: none; }
}

/* 通过 ?mode=play 显式进入“纯游戏”模式（适合投放二维码），桌面端也隐藏侧栏 */
body.play-mode .side-panel { display: none; }
body.play-mode .app { max-width: 540px; }
body.play-mode .touch-controls { display: grid; }



@media (max-width: 420px) {
  .scores { width: 100%; }
  .score-box { flex: 1; }
}

/* ===================== 计时排行榜（新增） ===================== */

/* ----------------------------- 计时器 --------------------------------- */
.timer {
  font-variant-numeric: tabular-nums;
  font-weight: 800;
  font-size: 18px;
  color: #ffd66b;
  background: var(--panel);
  border: 1px solid var(--line);
  padding: 8px 14px;
  border-radius: 10px;
  min-width: 78px;
  text-align: center;
}

/* --------------------------- 胜利提交 -------------------------------- */
.win-time { font-size: 15px; color: var(--text); margin: 6px 0 12px; }
.win-time span {
  color: #ffd66b;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}
.player-input {
  width: 100%;
  box-sizing: border-box;
  padding: 10px 12px;
  margin: 0 0 12px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: var(--navy-2);
  color: var(--text);
  font-size: 15px;
  outline: none;
}
.player-input::placeholder { color: var(--muted); }
.player-input:focus { border-color: var(--blue); }
.link-btn {
  color: var(--muted);
  text-decoration: underline;
  cursor: pointer;
  align-self: center;
  font-size: 14px;
  margin-left: 6px;
}
.link-btn:hover { color: var(--text); }
.submit-msg {
  margin: 12px 0 0;
  font-size: 14px;
  color: #8fe3a0;
  word-break: break-word;
}

/* ------------------------------ 弹层 --------------------------------- */
.modal {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(4, 14, 26, 0.72);
  backdrop-filter: blur(3px);
  animation: fade 0.18s ease;
}
.modal[hidden] { display: none; }
.modal-card {
  width: min(92vw, 560px);
  max-height: 82vh;
  overflow: auto;
  background: linear-gradient(160deg, var(--panel) 0%, var(--navy-2) 100%);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px 20px 22px;
}
.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.modal-head h2 { margin: 0; font-size: 20px; }
.modal-close {
  appearance: none;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 26px;
  line-height: 1;
  cursor: pointer;
  padding: 0 6px;
}
.modal-close:hover { color: var(--text); }

/* --------------------------- 排行榜列表 ------------------------------ */
.leaderboard-body { margin-top: 4px; }
.lb-loading, .lb-empty, .lb-error {
  color: var(--muted);
  font-size: 14px;
  text-align: center;
  padding: 18px 0;
}
.lb-error { color: #ff9b9b; }
.lb-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.lb-table th, .lb-table td {
  padding: 9px 10px;
  text-align: left;
  border-bottom: 1px solid var(--line);
}
.lb-table th {
  color: var(--muted);
  font-weight: 700;
  letter-spacing: 0.5px;
}
.lb-table tbody tr:hover { background: rgba(255, 255, 255, 0.04); }
.lb-table td:first-child, .lb-table th:first-child {
  width: 56px;
  text-align: center;
  color: #ffd66b;
  font-weight: 800;
}
.lb-name { font-weight: 700; }

  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <div class="logo" aria-hidden="true">M</div>
        <div class="titles">
          <h1>产品合成 2048</h1>
          <p>Molex 产品线 · 滑动合成，集齐 <strong>MX DaSH</strong></p>
        </div>
      </div>
      <div class="scores">
        <div class="score-box">
          <span class="score-label">得分</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">最高分</span>
          <span class="score-value" id="best">0</span>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="game-panel">
        <div class="toolbar">
          <button id="new-game" class="btn btn-primary" type="button">新游戏</button>
          <button id="btn-leaderboard" class="btn" type="button">排行榜</button>
          <span class="timer" id="timer" title="本次用时">00:00</span>
          <p class="hint">方向键 / WASD / 滑动 控制移动</p>
        </div>

        <div class="board" id="board">
          <div class="cells" id="cells" aria-hidden="true"></div>
          <div class="tiles" id="tiles"></div>
          <div class="overlay" id="overlay" hidden>
            <div class="overlay-card">
              <h2 id="overlay-title">游戏结束</h2>
              <p id="overlay-text"></p>

              <!-- 胜利：本次用时 + 提交成绩 -->
              <div id="win-submit" hidden>
                <p class="win-time">本次用时：<span id="win-time-value">00:00</span></p>
                <input id="player-name" class="player-input" type="text" maxlength="24" placeholder="输入你的名字" autocomplete="off" />
                <div class="overlay-actions">
                  <button id="submit-score" class="btn btn-primary" type="button">提交成绩</button>
                  <a id="skip-submit" class="link-btn" href="#">跳过</a>
                </div>
                <p id="submit-msg" class="submit-msg" hidden></p>
              </div>

              <!-- 默认操作（失败/重开） -->
              <div class="overlay-actions" id="default-actions">
                <button id="overlay-keep" class="btn btn-primary" type="button" hidden>继续游戏</button>
                <button id="overlay-restart" class="btn" type="button">重新开始</button>
              </div>
            </div>
          </div>
        </div>

        <div class="touch-controls" id="touch-controls" aria-label="方向控制">
          <button class="dpad up" data-dir="up" type="button" aria-label="上">▲</button>
          <button class="dpad left" data-dir="left" type="button" aria-label="左">◀</button>
          <button class="dpad down" data-dir="down" type="button" aria-label="下">▼</button>
          <button class="dpad right" data-dir="right" type="button" aria-label="右">▶</button>
        </div>
      </section>

      <aside class="side-panel">
        <div class="card qr-card">
          <h3>手机扫码，随时开玩</h3>
          <div class="qr-box" id="qr"></div>
          <p class="qr-note" id="qr-url"></p>
        </div>
        <div class="card legend">
          <h3>产品序列</h3>
          <ul id="legend-list"></ul>
        </div>
      </aside>
    </main>

    <footer class="app-footer">
      <span>寇豆码 · 纯前端零依赖 · 可离线 / 局域网 / 公网直接打开</span>
    </footer>
  </div>

    <!-- 排行榜弹层 -->
    <div class="modal" id="leaderboard-modal" hidden>
      <div class="modal-card">
        <div class="modal-head">
          <h2>完成排行榜</h2>
          <button id="leaderboard-close" class="modal-close" type="button" aria-label="关闭">&times;</button>
        </div>
        <div id="leaderboard-body" class="leaderboard-body"></div>
      </div>
    </div>

var qrcode = function() {

  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        if (i < 6) {

  move(direction) {
    if (this.over) return { moved: false, gained: 0 };
    if (this.won && !this.keepPlaying) return { moved: false, gained: 0 };

    const vector = this.getVector(direction);
    const trav = this.buildTraversals(vector);
    let moved = false;
    let gained = 0;

    this.prepareTiles();

    trav.rows.forEach((r) => {
      trav.cols.forEach((c) => {
        const tile = this.grid[r][c];
        if (!tile) return;

        const { farthest, next } = this.findFarthest({ row: r, col: c }, vector);
        const nextTile = this.withinBounds(next) ? this.grid[next.row][next.col] : null;

        if (nextTile && nextTile.level === tile.level && !nextTile.mergedFrom) {
          // 合并
          const newLevel = nextLevel(tile.level);
          const merged = {
            id: (this.tileId += 1),
            level: newLevel,
            row: next.row,
            col: next.col,
            mergedFrom: [tile, nextTile],
          };
          this.insertTile(merged);
          this.removeTile(tile);
          tile.row = next.row;
          tile.col = next.col;
          gained += scoreFor(newLevel);
          if (newLevel === MAX_LEVEL && !this.won) {
            this.won = true;
            this.stopTimer(); // 达成 MX DaSH，停止计时
            this.elapsedMs = Date.now() - this.startTime;
          }
          moved = true;
        } else if (farthest.row !== r || farthest.col !== c) {
          // 仅移动
          this.removeTile(tile);
          tile.row = farthest.row;
          tile.col = farthest.col;
          this.insertTile(tile);
          moved = true;
        }
      });
    });

    if (moved) {
      this.score += gained;
      if (this.score > this.best) {
        this.best = this.score;
        saveBest(this.best);
      }
      this.addRandomTile();
      if (!this.movesAvailable()) {
        this.over = true;
        this.stopTimer(); // 游戏结束，停止计时
      }
    }

    this.actuate();
    return { moved, gained };
  }

  /** 是否还有可行移动 */
  movesAvailable() {
    return this.availableCells().length > 0 || this.tileMatchesAvailable();
  }

  tileMatchesAvailable() {
    for (let r = 0; r < this.size; r += 1) {
      for (let c = 0; c < this.size; c += 1) {
        const t = this.grid[r][c];
        if (!t) continue;
        const right = c + 1 < this.size ? this.grid[r][c + 1] : null;
        const down = r + 1 < this.size ? this.grid[r + 1][c] : null;
        if (right && right.level === t.level) return true;
        if (down && down.level === t.level) return true;
      }
    }
    return false;
  }

  /* ----------------------------- 渲染 ----------------------------- */

  /** 根据行列计算瓦片定位（百分比 calc，随容器自适应） */
  applyPosition(el, pos) {
    const cell = `(100% - 2 * var(--pad) - (var(--n) - 1) * var(--gap)) / var(--n)`;
    el.style.width = `calc(${cell})`;
    el.style.height = `calc(${cell})`;
    el.style.left = `calc(var(--pad) + ${pos.col} * (${cell} + var(--gap)))`;
    el.style.top = `calc(var(--pad) + ${pos.row} * (${cell} + var(--gap)))`;
  }

  addTileEl(tile) {
    const wrapper = document.createElement('div');
    wrapper.className = 'tile';
    const style = LEVEL_STYLES[tile.level - 1];
    wrapper.style.background = style.bg;
    wrapper.style.color = style.fg;

    const inner = document.createElement('div');
    inner.className = 'tile-inner';
    const name = PRODUCTS[tile.level - 1].name;
    inner.textContent = name;
    const len = name.length;
    inner.classList.add(len <= 5 ? 'sz-lg' : len <= 7 ? 'sz-md' : 'sz-sm');
    wrapper.appendChild(inner);

    const hasPrev = tile.prevRow !== undefined;
    const prev = hasPrev ? { row: tile.prevRow, col: tile.prevCol } : { row: tile.row, col: tile.col };
    this.applyPosition(wrapper, prev);
    this.tilesEl.appendChild(wrapper);

    if (hasPrev && (tile.prevRow !== tile.row || tile.prevCol !== tile.col)) {
      // 先置于旧位置，下一帧过渡到新位置（产生滑动动画）
      window.requestAnimationFrame(() => this.applyPosition(wrapper, { row: tile.row, col: tile.col }));
    } else if (tile.mergedFrom) {
      wrapper.classList.add('tile-merged');
      // 渲染两个来源瓦片，使其滑入合并位置
      tile.mergedFrom.forEach((src) => this.addTileEl(src));
    } else if (tile.isNew) {
      wrapper.classList.add('tile-new');
    }
  }

  actuate() {
    this.tilesEl.innerHTML = '';
    this.eachCell((r, c, t) => {
      if (t) this.addTileEl(t);
    });
    this.scoreEl.textContent = this.score;
    this.bestEl.textContent = this.best;
    this.updateOverlay();
  }

  updateOverlay() {
    if (this.over) {
      this.showOverlay('游戏结束', `本局得分 ${this.score} · 最高分 ${this.best}`, 'lose');
    } else if (this.won && !this.keepPlaying) {
      this.showOverlay('🎉 达成 MX DaSH！', `你合成出了顶级产品！当前得分 ${this.score}`, 'win');
    } else {
      this.hideOverlay();
    }
  }

  /**
   * 显示遮罩。mode 为 'win' 展示「用时+提交成绩」，否则展示默认操作。
   * @param {string} title
   * @param {string} text
   * @param {'win'|'lose'|string} mode
   */
  showOverlay(title, text, mode) {
    this.overlayTitle.textContent = title;
    this.overlayText.textContent = text;
    const isWin = mode === 'win';
    if (this.winSubmit) this.winSubmit.hidden = !isWin;
    if (this.defaultActions) this.defaultActions.hidden = isWin;
    if (isWin) {
      if (this.winTimeValue) this.winTimeValue.textContent = formatTime(this.elapsedMs);
      if (this.playerName) this.playerName.value = '';
      if (this.submitMsg) this.submitMsg.hidden = true;
    }
    this.overlayEl.hidden = false;
  }

  hideOverlay() {
    this.overlayEl.hidden = true;
  }

  /* ----------------------------- 计时器 ----------------------------- */

  /**
   * 启动计时。测试环境（document.readyState 为 undefined）下不启动定时器，
   * 避免阻塞测试进程退出。
   */
  startTimer() {
    if (typeof document === 'undefined' || document.readyState === undefined) return;
    this.stopTimer();
    this.startTime = Date.now();
    this.elapsedMs = 0;
    this.updateTimerDisplay();
    this.timerId = setInterval(() => this.updateTimerDisplay(), 250);
  }

  /** 停止计时 */
  stopTimer() {
    if (this.timerId) {
      clearInterval(this.timerId);
      this.timerId = null;
    }
  }

  /** 刷新计时器 UI（运行中显示实时，停止后显示最终用时） */
  updateTimerDisplay() {
    if (!this.timerEl) return;
    const ms = this.timerId ? (Date.now() - this.startTime) : this.elapsedMs;
    this.timerEl.textContent = formatTime(ms);
  }

  /* --------------------------- 提交成绩 --------------------------- */

  /**
   * 提交本次成绩到后端。失败仅提示，不影响本地继续游戏。
   */
  async submitScore() {
    if (!this.submitMsg) return;
    const player = sanitizeName(this.playerName ? this.playerName.value : '') || '匿名玩家';
    const payload = {
      player,
      timeMs: this.elapsedMs,
      won: true,
      maxLevel: MAX_LEVEL,
    };
    this.submitMsg.hidden = false;
    this.submitMsg.textContent = '提交中…';
    try {
      const resp = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (resp.status === 429) {
        // 频率限制：后端明确拒绝，给出对应提示
        this.submitMsg.textContent = '提交过于频繁，请稍后再试';
        return;
      }
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      if (data && data.ok) {
        this.submitMsg.textContent = `提交成功，第 ${data.rank} 名！可前往排行榜查看。`;
      } else {
        this.submitMsg.textContent = '提交失败，可稍后重试。';
      }
    } catch (e) {
      // 后端缺失 / 网络错误：优雅降级，不影响本地游戏
      this.submitMsg.textContent = '提交失败，可稍后重试。';
    }
  }

  /* --------------------------- 排行榜弹层 --------------------------- */

  /** 打开排行榜弹层并拉取数据（获取失败优雅降级） */
  async openLeaderboard() {
    if (this.leaderboardModal) this.leaderboardModal.hidden = false;
    if (this.leaderboardBody) this.leaderboardBody.innerHTML = '<p class="lb-loading">加载中…</p>';
    try {
      const resp = await fetch('/api/leaderboard');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      this.renderLeaderboard((data && data.records) || []);
    } catch (e) {
      if (this.leaderboardBody) {
        this.leaderboardBody.innerHTML = '<p class="lb-error">无法连接排行榜服务（可能未部署后端）</p>';
      }
    }
  }

  /** 渲染排行榜表格 */
  renderLeaderboard(records) {
    if (!this.leaderboardBody) return;
    if (!records.length) {
      this.leaderboardBody.innerHTML = '<p class="lb-empty">暂无完成记录</p>';
      return;
    }
    const rows = records.map((r, i) => {
      const d = new Date(r.ts);
      const dateStr = isNaN(d.getTime()) ? '-' : d.toLocaleString();
      return `<tr><td>${i + 1}</td>` +
        `<td class="lb-name">${escapeHtml(r.player)}</td>` +
        `<td>${formatTime(r.timeMs)}</td>` +
        `<td>${escapeHtml(dateStr)}</td></tr>`;
    }).join('');
    this.leaderboardBody.innerHTML =
      '<table class="lb-table"><thead><tr>' +
      '<th>名次</th><th>玩家</th><th>用时</th><th>完成时间</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';
  }

  /** 关闭排行榜弹层 */
  closeLeaderboard() {
    if (this.leaderboardModal) this.leaderboardModal.hidden = true;
  }

  /* ----------------------------- 输入 ----------------------------- */

  bindInput() {
    const KEY_MAP = {
      ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
      w: 'up', s: 'down', a: 'left', d: 'right',
      W: 'up', S: 'down', A: 'left', D: 'right',
    };

    window.addEventListener('keydown', (e) => {
      const dir = KEY_MAP[e.key];
      if (dir) {
        e.preventDefault();
        this.move(dir);
      }
    });

    // 触摸滑动
    const board = document.getElementById('board');
    let sx = 0;
    let sy = 0;
    let tracking = false;
    board.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      sx = t.clientX;
      sy = t.clientY;
      tracking = true;
    }, { passive: true });
    board.addEventListener('touchend', (e) => {
      if (!tracking) return;
      tracking = false;
      const t = e.changedTouches[0];
      const dx = t.clientX - sx;
      const dy = t.clientY - sy;
      const adx = Math.abs(dx);
      const ady = Math.abs(dy);
      if (Math.max(adx, ady) < 24) return; // 滑动阈值
      if (adx > ady) this.move(dx > 0 ? 'right' : 'left');
      else this.move(dy > 0 ? 'down' : 'up');
    }, { passive: true });

    // 方向按钮（窄屏）
    document.getElementById('touch-controls').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-dir]');
      if (btn) this.move(btn.dataset.dir);
    });

    // 新游戏 / 遮罩按钮
    document.getElementById('new-game').addEventListener('click', () => this.restart());
    document.getElementById('overlay-restart').addEventListener('click', () => this.restart());
    this.overlayKeep.addEventListener('click', () => {
      this.keepPlaying = true;
      this.hideOverlay();
    });

    // 排行榜入口
    const btnLb = document.getElementById('btn-leaderboard');
    if (btnLb) btnLb.addEventListener('click', () => this.openLeaderboard());

    // 胜利：提交成绩 / 跳过
    const submitBtn = document.getElementById('submit-score');
    if (submitBtn) submitBtn.addEventListener('click', () => this.submitScore());
    const skipLink = document.getElementById('skip-submit');
    if (skipLink) skipLink.addEventListener('click', (e) => {
      e.preventDefault();
      this.keepPlaying = true; // 跳过提交，仍可本地继续游戏
      this.hideOverlay();
    });

    // 排行榜弹层关闭
    const lbClose = document.getElementById('leaderboard-close');
    if (lbClose) lbClose.addEventListener('click', () => this.closeLeaderboard());
    if (this.leaderboardModal) {
      this.leaderboardModal.addEventListener('click', (e) => {
        if (e.target === this.leaderboardModal) this.closeLeaderboard();
      });
    }
  }

  /* --------------------------- 侧栏图例 --------------------------- */
  renderLegend() {
    const ul = document.getElementById('legend-list');
    if (!ul) return;
    const frag = document.createDocumentFragment();
    PRODUCTS.forEach((p, i) => {
      const li = document.createElement('li');
      const sw = document.createElement('span');
      sw.className = 'swatch';
      sw.style.background = LEVEL_STYLES[i].bg;
      const nm = document.createElement('span');
      nm.textContent = `${p.level}. ${p.name}`;
      li.appendChild(sw);
      li.appendChild(nm);
      frag.appendChild(li);
    });
    ul.appendChild(frag);
  }
}

/* ================================================================== *
 * 5. 二维码（本地 qrcode-generator，零运行时外网依赖）
 * ================================================================== */
function renderQR() {
  const box = document.getElementById('qr');
  const note = document.getElementById('qr-url');
  if (!box) return;
  const url = window.location.href;
  if (note) note.textContent = url;

  try {
    if (typeof qrcode === 'function') {
      const qr = qrcode(0, 'M'); // typeNumber=0 自动选择
      qr.addData(url);
      qr.make();
      const dataUrl = qr.createDataURL(6, 8); // GIF data URL，可离线显示
      box.innerHTML = `<img src="${dataUrl}" alt="扫码开玩" />`;
    } else {
      box.textContent = '二维码库未加载';
    }
  } catch (err) {
    box.textContent = '生成二维码失败';
  }
}

/* ================================================================== *
 * 6. 启动
 * ================================================================== */
function init() {
  // ?mode=play：投放二维码用的纯游戏模式，桌面端也隐藏侧栏/二维码卡片
  const params = new URLSearchParams(window.location.search);
  if (params.get('mode') === 'play') {
    document.body.classList.add('play-mode');
  }
  const game = new Game();
  renderQR();
  window.__game = game; // 便于调试
}

// 仅在浏览器环境（存在 document）下自动启动；Node 测试时跳过。
if (typeof document !== 'undefined' && document.readyState !== undefined) {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
}

/* ================================================================== *
 * 7. Node 导出（单元测试用，不影响浏览器运行）
 * ================================================================== */
if (typeof module !== 'undefined' && module.exports) {
  module.exports = {
    PRODUCTS,
    MAX_LEVEL,
    nextLevel,
    scoreFor,
    formatTime,
    sanitizeName,
    escapeHtml,
    createEmptyBoard,
    cloneBoard,
    transpose,
    slideLine,
    moveBoard,
    addRandomTileBoard,
    hasMoves,
    isWinLevel,
    Game,
  };
}

  </script>
